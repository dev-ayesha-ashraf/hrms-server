services:

  # ─── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms_password
      POSTGRES_DB: hrms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d hrms_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Core
      DATABASE_URL: postgresql://hrms:hrms_password@db:5432/hrms_db
      SECRET_KEY: change-this-in-production-use-a-long-random-string
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      # CORS — set to your frontend origin(s), comma-separated
      CORS_ORIGINS: http://localhost:3000

      # Public base URL returned in avatar links etc.
      # Should match how external clients reach this API.
      BASE_URL: http://localhost:8000

      # Rate limiting (slowapi format: <count>/<period>)
      RATE_LIMIT: "60/minute"

      # Dashboard stats cache TTL in seconds
      DASHBOARD_CACHE_TTL: "60"
    volumes:
      # Persist uploaded files (avatars, etc.) across container restarts
      - uploads_data:/app/app/uploads

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data:
